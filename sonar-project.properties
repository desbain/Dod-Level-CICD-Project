# SonarCloud Configuration for DoD Ops Dashboard
sonar.projectKey=dod-ops-dashboard
sonar.organization=ernest41k
sonar.projectName=DoD Tactical Operations Center

# Source paths
sonar.sources=server,client/src
sonar.tests=server/__tests__
sonar.test.inclusions=**/*.test.js

# Exclusions
sonar.exclusions=**/node_modules/**,client/build/**,coverage/**,**/*.test.js

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
